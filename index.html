  <style>
    /* ─── Reset & Vars ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Light mode (default) ── */
    :root {
      --bg-grad:  linear-gradient(145deg, #cce8f0 0%, #a8d8e8 45%, #c8e8df 100%);
      --surface:  rgba(195,228,240,0.60);
      --surface2: rgba(175,215,230,0.50);
      --border:   rgba(90,180,210,0.35);
      --accent:   #0277bd;
      --accent2:  #00838f;
      --break:    #2e7d6e;
      --lbreak:   #5b7fa6;
      --text:     #013a5c;
      --muted:    #3a6a7a;
      --shadow:   0 4px 20px rgba(2,119,189,.15);
      --radius:   14px;
    }

    /* ── Dark mode ── */
    [data-theme="dark"] {
      --bg-grad:  linear-gradient(145deg, #04111e 0%, #062030 35%, #092a3a 65%, #051820 100%);
      --surface:  rgba(6,26,44,0.78);
      --surface2: rgba(4,18,32,0.68);
      --border:   rgba(0,140,190,0.22);
      --accent:   #29b6f6;
      --accent2:  #4dd0e1;
      --break:    #4db6ac;
      --lbreak:   #7eb8d4;
      --text:     #ddf0f8;
      --muted:    #6aaec0;
      --shadow:   0 4px 20px rgba(0,0,0,.55);
      --radius:   14px;
    }

    html, body {
      height: 100%;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg-grad);
      background-attachment: fixed;
    }

    /* ─── Theme toggle ─── */
    .theme-btn {
      position: fixed;
      top: 16px; right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .theme-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ─── Header ─── */
    header {
      text-align: center;
      padding: 28px 20px 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    header a {
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
    }
    header a:hover { text-decoration: underline; }

    /* ─── Main Layout ─── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px 40px;
      align-items: start;
    }

    /* ─── Timer Card ─── */
    .timer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      gap: 6px;
      background: var(--surface2);
      border-radius: 8px;
      padding: 4px;
      border: 1px solid var(--border);
    }
    .mode-tab {
      padding: 6px 18px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all .2s;
    }
    .mode-tab.active {
      background: var(--accent);
      color: white;
    }
    .mode-tab.active[data-mode="break"]  { background: var(--break); }
    .mode-tab.active[data-mode="lbreak"] { background: var(--lbreak); }

    /* Circular timer */
    .timer-ring-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      flex-shrink: 0;
    }
    .timer-ring-wrap svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset .9s linear, stroke .3s;
    }
    .timer-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      pointer-events: none;
    }
    #timer-display {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .timer-mode-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    /* Controls */
    .timer-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-start {
      background: var(--accent);
      color: white;
      padding: 0;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;

    .btn-start:hover { filter: brightness(1.15); }
    .btn-icon {

      border: 1px solid var(--border);
      color: var(--muted);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      padding: 0;
    }
    .btn-icon:hover { color: var(--text); border-color: var(--text); }
    .btn svg { pointer-events: none; }

    /* Session dots */

      gap: 8px;
      align-items: center;
    }
    .session-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: background .3s;
    }
    .session-dot.done { background: var(--accent); }
    .sessions-label {
      font-size: 12px;
      color: var(--muted);
      margin-left: 6px;

    /* Settings row */
    .settings-row {

      gap: 10px;

      justify-content: center;
      flex-wrap: wrap;

    .setting-item {
      display: flex;
      flex-direction: column;
      align-items: center;

    .setting-input-row { display: flex; align-items: center; gap: 4px; }
    .setting-unit { font-size: 12px; color: var(--muted); }
    .setting-input {

      border-radius: 6px;

    /* Sound toggle */
    .sound-row {

      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;

    .toggle {

    .toggle::after {

      width: 14px; height: 14px;
      border-radius: 50%;
      background: white;
      transition: left .2s;

    .toggle.on { background: var(--accent); }

    .yt-wrap {

      border: 1px solid var(--border);

    .yt-player {

    #yt-frame { background: #000; }
    #yt-frame iframe {

      height: 100% !important;

/* Video slider */
    .video-slider-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .video-slider-arrow {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);

      width: 28px;

      align-items: center;
      justify-content: center;

    .video-thumb-overlay {
      position: absolute;

    .bgm-desc {

    footer a:hover { text-decoration: underline; }

    /* ─── Responsive ─── */
    @media (max-width: 780px) {
      .main {

      }
      .bgm-card { order: -1; }

    @media (max-width: 400px) {
      #timer-display { font-size: 38px; }
      .timer-ring-wrap { width: 200px; height: 200px; }
      .timer-card { padding: 24px 16px 20px; }
      .mode-tab { padding: 5px 8px; font-size: 11px; }
    }
  </style>
</head>

<!-- Notification sound (Web Audio API) -->
<script>
// ─── Config ───────────────────────────────────────────────
const DEFAULT_TIMES = { work: 25, break: 5, lbreak: 15 };

// ─── State ────────────────────────────────────────────────
let state = {
  mode:      'work',   // 'work' | 'break' | 'lbreak'
  running:   false,
  remaining: DEFAULT_TIMES.work * 60,
  total:     DEFAULT_TIMES.work * 60,
  sessions:  0,
  sound:     true,
  bgm:       true,
  times:     { ...DEFAULT_TIMES },
};
let interval = null;
let ytPlayer  = null;  // YouTube IFrame API player instance
let ytReady   = false;

// ─── Timer Logic ──────────────────────────────────────────
function toggleTimer() {
  if (state.running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function setPlayState(playing) {
  document.getElementById('icon-play').style.display  = playing ? 'none' : '';
  document.getElementById('icon-pause').style.display = playing ? '' : 'none';
}

function startTimer() {
  state.running = true;
  setPlayState(true);
  if (ytPlayer && ytReady && state.mode === 'work' && state.bgm) {
    ytPlayer.playVideo();
  }
  interval = setInterval(tick, 1000);
}

function pauseTimer() {
  state.running = false;
  setPlayState(false);
  clearInterval(interval);
  if (ytPlayer && ytReady) ytPlayer.pauseVideo();
}

function resetTimer() {
  clearInterval(interval);
  state.running = false;
  state.remaining = state.total;
  setPlayState(false);
  if (ytPlayer && ytReady) ytPlayer.pauseVideo();
  updateDisplay();
}

function skipSession() {
  clearInterval(interval);
  state.running = false;
  onSessionEnd();
}

function tick() {
  state.remaining--;
  updateDisplay();
  if (state.remaining <= 0) {
    clearInterval(interval);
    state.running = false;
    onSessionEnd();
  }
}

function onSessionEnd() {
  if (state.sound) playChime();

  if (state.mode === 'work') {
    state.sessions++;
    updateSessionDots();
    // 4セッション毎に長休憩
    const nextMode = (state.sessions % 4 === 0) ? 'lbreak' : 'break';
    setMode(nextMode);
    // 休憩中はBGM停止
    if (ytPlayer && ytReady) ytPlayer.pauseVideo();
  } else {
    setMode('work');
    // 作業再開時にBGM自動再生（BGM ONの場合）
    if (ytPlayer && ytReady && state.bgm) ytPlayer.playVideo();
  }
  // 自動開始
  startTimer();
}

// ─── Mode ─────────────────────────────────────────────────
function setMode(mode) {
  state.mode = mode;
  const mins = state.times[mode];
  state.total = mins * 60;
  state.remaining = state.total;
  state.running = false;
  clearInterval(interval);
  setPlayState(false);

  // Tabs
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });

  // Ring color
  const colors = { work: 'var(--accent)', break: 'var(--break)', lbreak: 'var(--lbreak)' };
  document.getElementById('ring').style.stroke = colors[mode];

  // Label
  const labels = { work: '作業中', break: '休憩中', lbreak: '長休憩中' };
  document.getElementById('mode-label').textContent = labels[mode];

  updateDisplay();
}

// ─── Display ──────────────────────────────────────────────
function updateDisplay() {
  const m = String(Math.floor(state.remaining / 60)).padStart(2, '0');
  const s = String(state.remaining % 60).padStart(2, '0');
  document.getElementById('timer-display').textContent = `${m}:${s}`;
  document.title = `${m}:${s} - Pomodoro`;

  // Ring progress
  const CIRC = 678.6;
  const pct  = state.total > 0 ? state.remaining / state.total : 1;
  document.getElementById('ring').style.strokeDashoffset = CIRC * (1 - pct);
}

function updateSessionDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById(`dot-${i}`);
    dot.classList.toggle('done', i < (state.sessions % 4 === 0 && state.sessions > 0 ? 4 : state.sessions % 4));
  }
  document.getElementById('session-label').textContent =
    `${state.sessions} セッション完了`;
}

// ─── Settings ─────────────────────────────────────────────
function applySettings() {
  state.times.work   = parseInt(document.getElementById('set-work').value)   || 25;
  state.times.break  = parseInt(document.getElementById('set-break').value)  || 5;
  state.times.lbreak = parseInt(document.getElementById('set-lbreak').value) || 15;
  // 現在のモードに反映
  setMode(state.mode);
}

// ─── Sound / BGM ──────────────────────────────────────────
function toggleSound() {
  state.sound = !state.sound;
  document.getElementById('sound-toggle').classList.toggle('on', state.sound);
}

function toggleBgm() {
  state.bgm = !state.bgm;
  document.getElementById('bgm-toggle').classList.toggle('on', state.bgm);
  if (!state.bgm) {
    if (ytPlayer && ytReady) ytPlayer.pauseVideo();
  } else {
    // OFFからONに戻したとき、作業中ならすぐ再生
    if (ytPlayer && ytReady && state.running && state.mode === 'work') {
      ytPlayer.playVideo();
    }
  }
}

function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;

    // ── 短く柔らかい「ポッ」という一音 ──
    // sine波を極小音量・素早く立ち上げ→ゆっくり消す
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type            = 'sine';
    osc.frequency.value = 880; // A5: 高すぎず低すぎない柔らかい音域

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.10, now + 0.008); // 8ms で立ち上がり
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5); // 0.5秒でフェードアウト

    osc.start(now);
    osc.stop(now + 0.5);

  } catch (e) {}
}

// ─── Theme ────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const btn    = document.getElementById('theme-btn');
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    btn.textContent = '🌙 ダーク';
    localStorage.setItem('theme', 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️ ライト';
    localStorage.setItem('theme', 'dark');
  }
}

// 前回のテーマを復元
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-btn').textContent = '☀️ ライト';
  }
})();

// ─── YouTube IFrame API ───────────────────────────────────
const VIDEO_IDS = ['dWWXrB8pErU', 'VH8bojgRJWk', 'epy4bMdQKzU', '8JSB-CdLeoY', 'zPZgTtF2uLw'];
let activeThumb = 0;
let sliderOffset = 0;
let ytApiLoaded = false;

function loadYTApi() {
  if (ytApiLoaded) return;
  ytApiLoaded = true;
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function() {};

// ─── Slider ───────────────────────────────────────────────
function renderSlider() {
  const track = document.getElementById('slider-track');
  track.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const idx = (sliderOffset + i) % VIDEO_IDS.length;
    const el = document.createElement('div');
    el.className = 'video-thumb' + (idx === activeThumb ? ' active' : '');
    el.onclick = () => selectVideo(idx);
    el.innerHTML = `<img src="https://img.youtube.com/vi/${VIDEO_IDS[idx]}/mqdefault.jpg" alt="Lofi BGM Vol.${idx+1}" loading="lazy"><div class="video-thumb-overlay">▶</div>`;
    track.appendChild(el);
  }
}

function slideVideo(dir) {
  sliderOffset = (sliderOffset + dir + VIDEO_IDS.length) % VIDEO_IDS.length;
  renderSlider();
}

function selectVideo(index) {
  loadYTApi();
  activeThumb = index;
  renderSlider();

  const container = document.getElementById('yt-frame');
  if (ytPlayer) {
    try { ytPlayer.destroy(); } catch(e) {}
    ytPlayer = null;
    ytReady  = false;
  }
  container.innerHTML = '<div id="yt-player-el"></div>';

  function createPlayer() {
    if (typeof YT === 'undefined' || !YT.Player) { setTimeout(createPlayer, 200); return; }
    ytPlayer = new YT.Player('yt-player-el', {
      width: '100%', height: '100%',
      videoId: VIDEO_IDS[index],
      playerVars: { autoplay: 1, rel: 0, modestbranding: 1, playsinline: 1 },
      events: { onReady: () => { ytReady = true; } },
    });
  }
  createPlayer();
}

// ─── Init ─────────────────────────────────────────────────
updateDisplay();
renderSlider();
selectVideo(0);
</script>
